name: Validate plugin + marketplace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to defeat compromised-tag attacks. Dependabot keeps these current.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      # No `npm install` step. The previous version pulled js-yaml@4 with a
      # floating range on every PR run, which meant a compromised upstream
      # could land in the validation gate. We only need to check three things
      # in the frontmatter (name, description, allowed-tools exist) — a regex
      # per field is enough, and keeps the workflow's runtime supply chain to
      # the two SHA-pinned actions above.

      - name: Check plugin manifest exists at required path
        run: |
          test -f plugins/seo-rescue/.claude-plugin/plugin.json || (echo "::error::plugin.json missing at plugins/seo-rescue/.claude-plugin/plugin.json (this was the bug in v0.2.0/v0.2.1 — manifest at wrong path)" && exit 1)
          test -f .claude-plugin/marketplace.json || (echo "::error::marketplace.json missing" && exit 1)
          echo "✔ Manifest paths OK"

      - name: Validate plugin.json + marketplace.json parse as JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('plugins/seo-rescue/.claude-plugin/plugin.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'))"
          echo "✔ Manifest JSON valid"

      - name: Validate plugin.json required fields
        run: |
          node -e "
            const p = JSON.parse(require('fs').readFileSync('plugins/seo-rescue/.claude-plugin/plugin.json', 'utf8'));
            const required = ['name', 'version', 'description'];
            for (const f of required) {
              if (!p[f]) { console.error('::error::plugin.json missing required field:', f); process.exit(1); }
            }
            console.log('✔ plugin.json has all required fields');
          "

      - name: Validate marketplace.json references match plugin folders
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const mp = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            for (const plugin of (mp.plugins || [])) {
              const source = plugin.source;
              if (!source) { console.error('::error::marketplace plugin missing source:', plugin.name); process.exit(1); }
              const manifestPath = path.join(source, '.claude-plugin', 'plugin.json');
              if (!fs.existsSync(manifestPath)) {
                console.error('::error::marketplace.json references', plugin.name, 'but', manifestPath, 'does not exist');
                process.exit(1);
              }
            }
            console.log('✔ marketplace.json references resolve');
          "

      - name: Validate all SKILL.md frontmatters have required fields
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const skillsDir = 'plugins/seo-rescue/skills';
            // Required fields. allowed-tools is enforced to prevent regression of
            // the M5 finding (full session tool surface inherited by every skill).
            const REQUIRED = ['name', 'description', 'allowed-tools'];
            const hasField = (yamlText, key) => new RegExp('^' + key.replace(/[-]/g, '[-]') + ':\\\\s+\\\\S', 'm').test(yamlText);
            let failed = 0;
            for (const name of fs.readdirSync(skillsDir)) {
              const f = path.join(skillsDir, name, 'SKILL.md');
              if (!fs.existsSync(f)) continue;
              const src = fs.readFileSync(f, 'utf8');
              const m = src.match(/^---\\n([\\s\\S]*?)\\n---/);
              if (!m) { console.error('::error::no frontmatter in', f); failed++; continue; }
              const fm = m[1];
              const missing = REQUIRED.filter(k => !hasField(fm, k));
              if (missing.length) {
                console.error('::error::', f, '— missing required frontmatter field(s):', missing.join(', '));
                failed++;
                continue;
              }
              console.log('✔', name, '— frontmatter has', REQUIRED.join(', '));
            }
            if (failed) process.exit(1);
            console.log('✔ All SKILL.md frontmatters have required fields');
          "

      # find -print0 + while-read avoids shell word-splitting on filenames containing
      # spaces, quotes, or shell metacharacters — and prevents a hostile PR-supplied
      # filename like `'); process.exit(99); //.example.json` from breaking the
      # subsequent `node -e` step via string interpolation.
      - name: Syntax-check all Node.js scripts
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' f; do
            echo "Checking $f"
            node --check "$f" || fail=1
          done < <(find plugins/seo-rescue -name '*.js' -print0)
          [ "$fail" -eq 0 ] || exit 1
          echo "✔ All .js files pass syntax check"

      - name: Validate example JSON configs parse
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' f; do
            echo "Checking $f"
            # Pass filename via env var, not shell interpolation, so untrusted
            # filenames can never escape into the node -e source.
            FILE="$f" node -e "JSON.parse(require('fs').readFileSync(process.env.FILE, 'utf8'))" || fail=1
          done < <(find plugins/seo-rescue -name '*.example.json' -print0)
          [ "$fail" -eq 0 ] || exit 1
          echo "✔ All example JSON configs parse"

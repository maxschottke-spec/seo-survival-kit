name: Validate plugin + marketplace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.com/install.sh | bash || npm install -g @anthropic-ai/claude-code
          which claude || (echo "Claude Code CLI not installed" && exit 1)
          claude --version

      - name: Validate marketplace manifest
        run: claude plugin validate .

      - name: Validate plugin (seo-rescue)
        run: claude plugin validate plugins/seo-rescue

      - name: Syntax-check all scripts
        run: |
          for f in $(find plugins/seo-rescue -name '*.js'); do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Validate config example JSONs parse
        run: |
          for f in $(find plugins/seo-rescue -name '*.example.json'); do
            echo "Parsing $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done

      - name: Validate plugin.json + marketplace.json parse
        run: |
          node -e "JSON.parse(require('fs').readFileSync('plugins/seo-rescue/.claude-plugin/plugin.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'))"

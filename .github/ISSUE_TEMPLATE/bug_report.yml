name: Bug report
description: Something does not work as documented
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill in the fields below so we can reproduce the issue quickly.
        For security-sensitive items, please use the private security advisory link from the issue chooser instead.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: From `plugin.json` or the install command (`#v0.x.y`)
      placeholder: "v0.4.0"
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`
      placeholder: "2.1.148"
    validations:
      required: true

  - type: dropdown
    id: skill
    attributes:
      label: Which skill is affected?
      options:
        - rescue (orchestrator)
        - seo-audit-free
        - post-core-update-recovery
        - seo-outreach-report
        - channel-economics-analyzer
        - competitor-deep-audit
        - psi-weekly-cron-baseline
        - ai-search-rescue
        - subscription-monetization-audit
        - other / not skill-specific
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concrete description. Include the exact slash command or trigger phrase you used.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Step by step so someone else can reproduce. Include API responses, error messages, file paths if relevant. Redact API keys.
      render: shell
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version (if a script-runner skill is involved)
      placeholder: "v20.11.0 (output of `node --version`)"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Optional context. Logs, screenshots, what you already tried.
    validations:
      required: false
